<!DOCTYPE html>
<html>
<head>
    <title>Give Marks</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            background: linear-gradient(270deg, #141e30, #243b55, #1e3c72, #2a5298);
            background-size: 800% 800%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* Glass Box */
        .box {
            width: 430px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease, float 4s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: scale(0.9);}
            to {opacity: 1; transform: scale(1);}
        }

        @keyframes float {
            0% {transform: translateY(0);}
            50% {transform: translateY(-10px);}
            100% {transform: translateY(0);}
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Info Box */
        .info {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .info p {
            margin: 6px 0;
        }

        .label {
            font-weight: 600;
            color: #ddd;
        }

        /* Link */
        a {
            color: #60a5fa;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            text-shadow: 0 0 8px rgba(96,165,250,0.8);
        }

        /* Input */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            transition: 0.3s;
        }

        input::placeholder {
            color: #ddd;
        }

        input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<div class="box">

    <h2>📊 Give Marks</h2>

    <div class="info">
        <p><span class="label">Student:</span> {{ submission.student.name }}</p>
        <p><span class="label">Assignment:</span> {{ submission.assignment.title }}</p>

        {% if submission.file %}
            <p>
                <span class="label">File:</span>
                <a href="{{ submission.file.url }}" target="_blank">📂 View Submission</a>
            </p>
        {% endif %}
    </div>

    <form method="POST">
        {% csrf_token %}

        <input type="number" name="marks" placeholder="Enter Marks (out of 10)" required>

        <button type="submit">Submit Marks</button>
    </form>

</div>

</body>
</html>
