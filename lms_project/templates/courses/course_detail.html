<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(270deg, #141e30, #243b55, #1e3c72, #2a5298);
            background-size: 800% 800%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* Glass Card */
        .card-box {
            background: rgba(255,255,255,0.08);
            padding: 35px;
            border-radius: 20px;
            width: 520px;
            backdrop-filter: blur(18px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease, float 4s ease-in-out infinite;
            color: white;
        }

        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
        }

        @keyframes float {
            0% {transform: translateY(0);}
            50% {transform: translateY(-10px);}
            100% {transform: translateY(0);}
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
            font-weight: 700;
        }

        /* Description */
        .desc {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
        }

        hr {
            border-color: rgba(255,255,255,0.2);
        }

        /* Buttons */
        .btn-custom {
            width: 100%;
            margin-top: 10px;
            border-radius: 25px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00c9ff, #92fe9d);
            border: none;
            color: black;
        }

        .btn-primary:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .btn-success {
            background: linear-gradient(45deg, #00b09b, #96c93d);
            border: none;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            border: none;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="card-box">

    <h1>📚 {{ course.title }}</h1>

    <div class="desc">
        <p>{{ course.description }}</p>
    </div>

    <hr>

    {% if enrolled %}
        <button class="btn btn-success btn-custom" disabled>
            ✅ Already Enrolled
        </button>
    {% else %}
        <a href="/enroll/{{ course.id }}/" class="btn btn-primary btn-custom">
            🚀 Enroll Now
        </a>
    {% endif %}

    <a href="/dashboard/" class="btn btn-secondary btn-custom">
        🔙 Back to Dashboard
    </a>

</div>

</body>
</html>
