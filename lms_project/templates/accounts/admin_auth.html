<!DOCTYPE html>
<html>
<head>
    <title>Admin Portal</title>

    <style>
        body{
            font-family: Arial;
            background:#f3f4f6;
        }

        .box{
            width:400px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

        h2{
            text-align:center;
        }

        .section{
            margin-bottom:25px;
            border-bottom:1px solid #ddd;
            padding-bottom:15px;
        }
    </style>

</head>

<body>

<div class="box">

    <h2>Admin Portal</h2>

    <!-- LOGIN -->
    <div class="section">
        <h3>Login</h3>

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <!-- SIGNUP -->
    <div class="section">
        <h3>Create Admin</h3>

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="signup">

            <input type="text" name="username" placeholder="New Username" required>
            <input type="password" name="password" placeholder="New Password" required>

            <button type="submit">Create Account</button>
        </form>
    </div>

</div>

</body>
</html>
