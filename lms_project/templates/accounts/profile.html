{% extends 'base.html' %}

{% block content %}

<style>

.profile-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:70vh;
}

.profile-card{
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    max-width:700px;
    width:100%;
    text-align:center;
    transition:0.3s;
}

.profile-card:hover{
    transform:translateY(-3px);
}

.profile-image{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
    border:5px solid #2563eb;
}

.profile-name{
    font-size:26px;
    font-weight:bold;
    margin-bottom:10px;
    color:#111827;
}

.info{
    margin-bottom:12px;
    font-size:18px;
    color:#4b5563;
}

.info strong{
    color:#111827;
}

.edit-btn{
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:12px 22px;
    border-radius:10px;
    text-decoration:none;
    margin-top:25px;
    transition:0.3s;
}

.edit-btn:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

</style>

<div class="profile-wrapper">

    <div class="profile-card">

        {% if student.studentprofile.profile_pic %}

            <img src="{{ student.studentprofile.profile_pic.url }}"
                 class="profile-image">

        {% else %}

            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                 class="profile-image">

        {% endif %}

        <div class="profile-name">
            {{ student.name }}
        </div>

        <div class="info">
            <strong>Username:</strong> {{ student.username }}
        </div>

        <div class="info">
            <strong>Email:</strong> {{ student.email }}
        </div>

        <div class="info">
            <strong>Phone:</strong> {{ student.phone }}
        </div>

        <a href="/profile_update/" class="edit-btn">
            Edit Profile
        </a>

    </div>

</div>

{% endblock %}
