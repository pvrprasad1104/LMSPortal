{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card p-4 shadow-lg border-0 rounded-4">

        <h2 class="mb-4">Add Student</h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   class="form-control mb-3"
                   placeholder="Username"
                   required>

            <input type="text"
                   name="name"
                   class="form-control mb-3"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   class="form-control mb-3"
                   placeholder="Email"
                   required>

            <input type="text"
                   name="phone"
                   class="form-control mb-3"
                   placeholder="Phone"
                   required>

            <input type="password"
                   name="password"
                   class="form-control mb-3"
                   placeholder="Password"
                   required>

            <button class="btn btn-primary w-100">
                Add Student
            </button>

        </form>

    </div>

</div>

{% endblock %}
