<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            font-family:Arial;
        }

        .left{
            flex:1;
            background:url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");
            background-size:cover;
            background-position:center;
        }

        .right{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f5f5;
        }

        .login-box{
            width:320px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#ec4899;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#db2777;
        }

    </style>

</head>

<body>

    <div class="left"></div>

    <div class="right">

        <div class="login-box">

            <form method="POST">

                {% csrf_token %}

                <h2>Student Login</h2>

                <input type="text"
                        name="username"
                        placeholder="Enter Username"
                        required>

                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>

                <button type="submit">
                    Login
                </button>
            </form>

        </div>

    </div>

</body>
</html>
