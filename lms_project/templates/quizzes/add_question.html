{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Add Questions to Quiz</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Select Quiz</label>
        <select name="quiz" class="form-control" required>
            {% for quiz in quizzes %}
                <option value="{{ quiz.id }}">{{ quiz.title }}</option>
            {% endfor %}
        </select>

        <br>

        <input type="text" name="question" placeholder="Question" class="form-control" required><br>

        <input type="text" name="option1" placeholder="Option A" class="form-control"><br>
        <input type="text" name="option2" placeholder="Option B" class="form-control"><br>
        <input type="text" name="option3" placeholder="Option C" class="form-control"><br>
        <input type="text" name="option4" placeholder="Option D" class="form-control"><br>

        <label>Correct Answer (A/B/C/D)</label>
        <input type="text" name="correct" class="form-control" required><br>

        <button type="submit" class="btn btn-primary">
            Add Question
        </button>

    </form>

</div>

{% endblock %}
