<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: white;
            background: linear-gradient(270deg, #141e30, #243b55, #1e3c72, #2a5298);
            background-size: 800% 800%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            margin-top: 60px;
        }

        /* Glass Box */
        .box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        h2 {
            font-weight: 700;
        }

        /* Table */
        .table {
            color: white;
        }

        .table thead {
            background: rgba(255,255,255,0.1);
        }

        .table tbody tr {
            transition: 0.3s;
        }

        .table tbody tr:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.01);
        }

        /* Rank Styles */
        .rank {
            font-weight: bold;
        }

        .rank-1 {
            color: gold;
            text-shadow: 0 0 8px gold;
        }

        .rank-2 {
            color: silver;
        }

        .rank-3 {
            color: #cd7f32; /* bronze */
        }

        /* Score */
        .score {
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="box">

        <h2 class="text-center">🏆 Quiz Leaderboard</h2>

        <table class="table table-bordered table-hover mt-4">

            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Student</th>
                    <th>Quiz</th>
                    <th>Score</th>
                </tr>
            </thead>

            <tbody>
                {% for r in results %}
                <tr>
                    <td class="rank 
                        {% if forloop.counter == 1 %}rank-1
                        {% elif forloop.counter == 2 %}rank-2
                        {% elif forloop.counter == 3 %}rank-3
                        {% endif %}">
                        #{{ forloop.counter }}
                    </td>

                    <td>{{ r.student.name }}</td>
                    <td>{{ r.quiz.title }}</td>
                    <td class="score">{{ r.score }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No results yet</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
