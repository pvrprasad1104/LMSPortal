{% extends "base.html" %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(270deg, #141e30, #243b55, #1e3c72, #2a5298);
            background-size: 800% 800%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* Glass Box */
        .box {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 20px;
            width: 480px;
            backdrop-filter: blur(18px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease, float 4s ease-in-out infinite;
            color: white;
        }

        @keyframes fadeIn {
            from {opacity:0; transform:scale(0.9);}
            to {opacity:1; transform:scale(1);}
        }

        @keyframes float {
            0% {transform: translateY(0);}
            50% {transform: translateY(-10px);}
            100% {transform: translateY(0);}
        }

        h2 {
            text-align: center;
            margin-bottom: 18px;
            font-weight: 700;
        }

        /* Inputs */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            transition: 0.3s;
        }

        input::placeholder,
        textarea::placeholder {
            color: #ddd;
        }

        input:focus,
        textarea:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        label {
            margin-top: 8px;
            font-weight: 500;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            background: linear-gradient(45deg, #00c9ff, #92fe9d);
            color: black;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        /* Note */
        .note {
            text-align: center;
            font-size: 12px;
            color: #ddd;
            margin-top: 12px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>📝 Create Quiz</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Quiz Title">

        <textarea name="description" placeholder="Quiz Description"></textarea>

        <label><b>Deadline</b></label>
        <input type="datetime-local" name="deadline">

        <button type="submit">🚀 Create Quiz</button>
    </form>

    <div class="note">
        Create quiz before adding questions
    </div>

</div>

</body>
</html>
{% endblock %}
